name: claudelab

# Two networks, deliberately separated:
#   portal-net    — caddy ↔ portal (control plane)
#   workspace-net — caddy ↔ ws-<user> (data plane)
#
# Caddy is the only service on both. The portal is NOT on workspace-net,
# so a compromised workspace cannot reach portal:3000 and forge the
# X-Auth-User header. Workspace containers are created by the portal via
# the Docker socket and attached to workspace-net.
networks:
  portal-net:
    name: portal-net
    driver: bridge
  workspace-net:
    name: workspace-net
    driver: bridge

volumes:
  caddy-data:
  caddy-config:
  caddy-logs:

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
      - "${CADDY_HTTPS_PORT:-8443}:443"
    environment:
      # SITE_ADDRESS=":80" → HTTP-only on any host (IP-based access).
      # SITE_ADDRESS="box.example.com" → auto-HTTPS via Let's Encrypt.
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    volumes:
      # Bind-mount the whole caddy/ directory (not individual files) — this
      # avoids Docker auto-creating empty directories when a single-file
      # bind-mount source is missing for any reason.
      - ./caddy:/etc/caddy:ro
      - caddy-data:/data
      - caddy-config:/config
      - caddy-logs:/var/log/caddy
    networks:
      # Caddy is the only service on both. It reverse-proxies to portal
      # on portal-net and to ws-<user> on workspace-net.
      - portal-net
      - workspace-net
    depends_on:
      - portal
      - oauth2-proxy

  # ---------------------------------------------------------------------
  # oauth2-proxy — Entra ID OIDC. Stateless; cookie-only sessions.
  # ---------------------------------------------------------------------
  # Sits behind Caddy. Caddy uses forward_auth against /oauth2/auth to
  # validate the session cookie on every request, and full-proxies the
  # /oauth2/* paths so the login/callback/sign_out flow works.
  #
  # We're in "reverse proxy" mode (--reverse-proxy=true) so trust of
  # X-Forwarded-* headers comes from Caddy. The "upstream" is a no-op
  # because forward_auth doesn't actually fetch through it.
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: oauth2-proxy
    restart: unless-stopped
    command:
      - --http-address=0.0.0.0:4180
      - --provider=oidc
      - --oidc-issuer-url=https://login.microsoftonline.com/${OIDC_TENANT_ID}/v2.0
      - --client-id=${OIDC_CLIENT_ID}
      - --client-secret=${OIDC_CLIENT_SECRET}
      - --cookie-secret=${OAUTH2_PROXY_COOKIE_SECRET}
      - --cookie-secure=true
      - --cookie-domain=${SITE_ADDRESS}
      - --cookie-samesite=lax
      - --cookie-expire=8h
      # Singular flag name despite the plural env-var spelling — confusing
      # but that's what oauth2-proxy v7 ships with. Comma-separated lists
      # only work via the env var; on the CLI, pass --email-domain multiple
      # times if you ever need more than one domain.
      - --email-domain=${OAUTH2_PROXY_EMAIL_DOMAINS:-*}
      - --redirect-url=https://${SITE_ADDRESS}/oauth2/callback
      - --reverse-proxy=true
      - --whitelist-domain=${SITE_ADDRESS}
      - --set-xauthrequest=true
      - --pass-access-token=false
      - --pass-authorization-header=false
      - --skip-provider-button=true
      - --oidc-groups-claim=groups
      - --scope=openid email profile
      # No actual upstream — forward_auth mode. The static://200 keeps
      # oauth2-proxy happy even though Caddy never proxies traffic
      # *through* it (only auth subrequests + the /oauth2/* paths).
      - --upstream=static://200
    networks:
      - portal-net

  portal:
    image: claudelab-portal:latest
    pull_policy: build
    build:
      context: ./portal
    container_name: portal
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      WORKSPACE_IMAGE: ${WORKSPACE_IMAGE:-claudelab-workspace:latest}
      # Power tier runs a separate image (Ubuntu + KDE Plasma + full Playwright).
      WORKSPACE_IMAGE_POWER: ${WORKSPACE_IMAGE_POWER:-claudelab-workspace-power:latest}
      WORKSPACE_NETWORK: workspace-net
      WORKSPACE_MEMORY_TERMINAL: ${WORKSPACE_MEMORY_TERMINAL:-2g}
      WORKSPACE_MEMORY_DESKTOP: ${WORKSPACE_MEMORY_DESKTOP:-3g}
      WORKSPACE_MEMORY_POWER: ${WORKSPACE_MEMORY_POWER:-6g}
      # /dev/shm per workspace. Docker default 64m crashes Chromium/Playwright
      # renderers; 512m clears it. Power tier runs several headed browsers at
      # once, so it gets a larger shm. See dockerctl.ts ShmSize.
      WORKSPACE_SHM_SIZE: ${WORKSPACE_SHM_SIZE:-512m}
      WORKSPACE_SHM_SIZE_POWER: ${WORKSPACE_SHM_SIZE_POWER:-2g}
      WORKSPACE_CPUS: ${WORKSPACE_CPUS:-1.5}
      WORKSPACE_CPUS_POWER: ${WORKSPACE_CPUS_POWER:-4}
      WORKSPACE_IDLE_HOURS: ${WORKSPACE_IDLE_HOURS:-2}
      # Bootstrap admin allowlist (emails). The canonical signal is the
      # Entra groups claim — see ADMIN_GROUP_OID — but this env is the
      # fallback for first sign-in before the group is wired up.
      ADMIN_USERS: ${ADMIN_USERS}
      ADMIN_GROUP_OID: ${ADMIN_GROUP_OID}
      DOMAIN: ${SITE_ADDRESS}
    volumes:
      # Portal needs Docker socket access to create/start/stop user containers.
      - /var/run/docker.sock:/var/run/docker.sock
      - caddy-logs:/var/log/caddy:ro
      # Portal reads/writes desktop.users to track which users have the
      # GUI tier enabled. The bcrypt users.users / admins.users files are
      # gone in this version — identity comes from Entra.
      - ./caddy:/caddy:rw
    networks:
      - portal-net
    # No published port — Caddy reaches it on the internal network.

  # ---------------------------------------------------------------------
  # Workspace image builder
  # ---------------------------------------------------------------------
  # This service exists only so the workspace image is built alongside the
  # rest of the stack. On Portainer Stack deploy with "rebuild image and
  # redeploy", the per-user image (claudelab-workspace:latest) is built
  # automatically. The container itself just prints and exits — it stays
  # in "Exited (0)" state in the stack, which is expected.
  #
  # Manual rebuild after Dockerfile changes:
  #   docker compose build workspace-image
  workspace-image:
    image: ${WORKSPACE_IMAGE:-claudelab-workspace:latest}
    pull_policy: build
    build:
      context: ./workspace-image
    container_name: workspace-image-builder
    restart: "no"
    # Override the workspace image's ENTRYPOINT (which would launch ttyd) so
    # this builder container exits 0 immediately after the image is built.
    entrypoint: ["true"]
    command: []

  # ---------------------------------------------------------------------
  # Power workspace image builder
  # ---------------------------------------------------------------------
  # Same one-shot pattern as workspace-image, for the power tier's separate
  # image (Ubuntu 24.04 + KDE Plasma + the full Playwright browser suite).
  # Much heavier to build (~10-20 min, several GB) — it's deliberately a
  # distinct service so a standard deploy that doesn't use the power tier
  # can skip it with:  docker compose build workspace-image portal
  #
  # Manual rebuild after Dockerfile changes:
  #   docker compose build workspace-image-power
  workspace-image-power:
    image: ${WORKSPACE_IMAGE_POWER:-claudelab-workspace-power:latest}
    pull_policy: build
    build:
      context: ./workspace-image-power
    container_name: workspace-image-power-builder
    restart: "no"
    entrypoint: ["true"]
    command: []
